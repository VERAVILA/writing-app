<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨练 · 写作练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --orange: #FF8C42;
  --orange-light: #FFA940;
  --orange-pale: #FFF3E6;
  --bg: #F7F5F2;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --sub: #8E8E93;
  --border: #E8E4DF;
  --green: #34C759;
  --red: #FF3B30;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 14px;
  padding-bottom: 80px;
  max-width: 680px;
  margin: 0 auto;
  line-height: 1.6;
}

/* 顶部技巧卡片 */
.header {
  background: linear-gradient(135deg, #FF8C42, #FFC53D);
  border-radius: 16px;
  padding: 18px 20px;
  color: #fff;
  margin-bottom: 12px;
}
.header .label {
  font-size: 11px;
  opacity: .8;
  margin-bottom: 3px;
  letter-spacing: 1px;
}
.header h1 {
  font-size: 22px;
  margin-bottom: 4px;
}
.header .desc {
  font-size: 13px;
  opacity: .9;
  line-height: 1.5;
}
.header .cat {
  display: inline-block;
  margin-top: 6px;
  background: rgba(255,255,255,.22);
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
}
.header .desc-block {
  margin-top: 8px;
  background: rgba(0,0,0,.12);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 12.5px;
  line-height: 1.6;
}
.header .desc-block b { font-size: 13px; }

/* 例句区 */
.section {
  background: var(--card);
  border-radius: 14px;
  padding: 13px 15px;
  margin-bottom: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,.04);
}
.section .title {
  font-size: 13px;
  font-weight: 700;
  color: var(--orange);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.title-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.title .dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
}
.mini-btns { display: flex; gap: 4px; }
.mini-btn {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--orange);
  background: var(--orange-pale);
  color: var(--orange);
  white-space: nowrap;
  transition: opacity .15s;
}
.mini-btn:active { opacity: .6; }
.mini-btn.alt {
  background: transparent;
  border-color: var(--border);
  color: var(--sub);
}
.example-text {
  font-size: 16px;
  line-height: 1.7;
  color: #2C2C2E;
  font-family: "Noto Serif CJK SC", "SimSun", serif;
  margin-bottom: 5px;
}
.example-src {
  font-size: 11px;
  color: var(--sub);
  margin-bottom: 5px;
}
.example-an {
  font-size: 12px;
  color: #555;
  background: #FAFAF8;
  border-left: 3px solid var(--orange);
  padding: 7px 10px;
  border-radius: 0 6px 6px 0;
  line-height: 1.5;
}

/* 写作区 */
.write-area {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  line-height: 1.8;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #FFFBF5;
  transition: border .2s;
}
.write-area:focus { border-color: var(--orange); }
.write-area::placeholder { color: #C0B8B0; }
.char-count {
  text-align: right;
  font-size: 12px;
  color: var(--sub);
  margin-top: 5px;
  margin-bottom: 10px;
}

/* 提交按钮 */
.btn-submit {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: linear-gradient(135deg, #FF8C42, #FFA940);
  color: #fff;
  transition: opacity .15s, transform .1s;
}
.btn-submit:active { transform: scale(.98); }
.btn-submit:disabled { opacity: .6; }

/* 反馈弹窗 */
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px 20px 30px;
  animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { text-align: center; font-size: 18px; margin-bottom: 4px; }
.modal .sub { text-align: center; font-size: 12px; color: var(--sub); margin-bottom: 14px; }
.score-badge {
  width: 80px; height: 80px;
  border-radius: 50%;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
}
.fb-block { margin-bottom: 12px; }
.fb-block .lb { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 5px; }
.fb-block ul { list-style: none; padding: 0; }
.fb-block li { font-size: 13px; color: #444; line-height: 1.7; padding: 4px 0 4px 14px; position: relative; }
.fb-block li::before { content: "•"; position: absolute; left: 2px; color: var(--orange); }

/* 历史记录 */
.history-header {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin: 16px 4px 8px;
}
.history-header h3 { font-size: 14px; font-weight: 700; }
.history-header .clear { font-size: 12px; color: var(--red); background: none; border: none; cursor: pointer; }
.history-item {
  background: var(--card);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,.03);
  cursor: pointer;
}
.history-item .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.history-item .tag {
  background: var(--orange-pale);
  color: var(--orange);
  padding: 1px 7px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.history-item .date { font-size: 11px; color: var(--sub); }
.history-item .score {
  margin-left: auto;
  background: var(--orange);
  color: #fff;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.history-item .preview {
  font-size: 13px;
  color: #444;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(.8);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

/* 统计面板 */
.stats-panel {
  background: linear-gradient(135deg, #FF8C42, #FF6B6B);
  border-radius: 16px;
  padding: 18px 20px;
  color: #fff;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(255,107,107,.25);
}
.stats-panel .stats-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.stat-item {
  text-align: center;
  background: rgba(255,255,255,.18);
  border-radius: 10px;
  padding: 10px 6px;
}
.stat-item .num {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.2;
}
.stat-item .label {
  font-size: 10px;
  opacity: .85;
  margin-top: 2px;
}
.praise-text {
  text-align: center;
  font-size: 13px;
  line-height: 1.7;
  background: rgba(255,255,255,.15);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 4px;
}

/* 日历 */
.calendar-panel {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 8px rgba(0,0,0,.04);
}
.calendar-panel .cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.calendar-panel .cal-header .cal-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.calendar-panel .cal-header button {
  background: var(--orange-pale);
  color: var(--orange);
  border: none;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
}
.calendar-panel .cal-header button:active { opacity: .6; }
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 4px;
}
.cal-weekdays span {
  text-align: center;
  font-size: 10px;
  color: var(--sub);
  font-weight: 600;
  padding: 2px 0;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  position: relative;
  transition: background .15s;
  padding: 2px 0;
}
.cal-day.empty { cursor: default; }
.cal-day .day-num { font-weight: 600; line-height: 1.2; }
.cal-day .day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  margin-top: 1px;
}
.cal-day.active-day {
  background: var(--orange);
  color: #fff;
}
.cal-day.active-day .day-dot { background: #fff; }
.cal-day.has-writing {
  background: var(--orange-pale);
  color: var(--orange);
}
.cal-day.today {
  border: 1.5px solid var(--orange);
}
.cal-day:not(.empty):not(.active-day):hover {
  background: #f0f0f0;
}

/* 日期详情弹窗 */
.date-detail-list { margin-top: 8px; }
.date-detail-item {
  background: #FAFAF8;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.date-detail-item .dd-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.date-detail-item .dd-tag {
  background: var(--orange-pale);
  color: var(--orange);
  padding: 1px 7px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.date-detail-item .dd-score {
  margin-left: auto;
  background: var(--orange);
  color: #fff;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.date-detail-item .dd-text {
  font-size: 13px;
  color: #444;
  line-height: 1.6;
}
.date-detail-item .dd-chars {
  font-size: 11px;
  color: var(--sub);
  margin-top: 3px;
}

/* 导出按钮 */
.export-btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1.5px dashed var(--border);
  background: transparent;
  color: var(--sub);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
}
.export-btn:active { opacity: .6; }

/* 空状态提示 */
.empty-hint {
  text-align: center;
  padding: 16px 12px;
  color: rgba(255,255,255,.7);
  font-size: 12.5px;
  line-height: 1.8;
}
.empty-hint .emoji { font-size: 28px; margin-bottom: 6px; display: block; }

/* 加载中 */
.loading {
  text-align: center;
  padding: 20px;
  color: var(--sub);
  font-size: 13px;
}
</style>
</head>
<body>

<!-- 顶部技巧卡片 -->
<div class="header">
  <div class="label" id="skillCat">加载中...</div>
  <h1 id="skillName">--</h1>
  <div class="desc-block" id="skillDescBlock">
    <b>技巧解释：</b><span id="skillDesc">--</span>
  </div>
  <div class="cat" id="skillNo"></div>
</div>

<!-- 例句区 -->
<div class="section" id="exampleSection">
  <div class="title">
    <div class="title-left"><span class="dot"></span> 例句参考</div>
    <div class="mini-btns">
      <button class="mini-btn" onclick="nextExample()">📖换句</button>
      <button class="mini-btn alt" onclick="nextSkill()">🔀换技巧</button>
    </div>
  </div>
  <div id="exampleBody">
    <div class="loading">例句加载中...</div>
  </div>
</div>

<!-- 写作区 -->
<div class="section">
  <div class="title">
    <div class="title-left"><span class="dot"></span> 你来写一个</div>
    <div class="mini-btns">
      <button class="mini-btn alt" id="btnCopy" onclick="copyText()" title="复制当前内容">📋复制</button>
      <button class="mini-btn alt" id="btnClear" onclick="clearText()" title="清空输入框">🗑清空</button>
    </div>
  </div>
  <textarea class="write-area" id="writeArea" placeholder="不限字数，用这个技巧写一个句子吧……&#10;&#10;写完后点击「提交」"></textarea>
  <div class="char-count" id="charCount">0 字</div>
  <button class="btn-submit" id="submitBtn" onclick="submitPractice()">提交练习</button>
</div>

<!-- 统计面板（始终存在，有数据时显示数据，无数据时显示引导） -->
<div class="stats-panel" id="statsPanel">
  <div class="stats-title">📊 我的写作数据</div>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-item">
      <div class="num" id="statDays">0</div>
      <div class="label">活跃天数</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statCount">0</div>
      <div class="label">练习次数</div>
    </div>
    <div class="stat-item">
      <div class="num" id="statChars">0</div>
      <div class="label">累计字数</div>
    </div>
  </div>
  <div class="praise-text" id="praiseText">开始你的第一次写作吧 ✨</div>
  <div class="empty-hint" id="statsHint" style="display:none">
    <span class="emoji">📝</span>
    提交第一次练习后<br>
    这里会显示你的活跃天数、练习次数、累计字数<br>
    还有连续写作记录和表扬语 🔥
  </div>
  <div style="font-size:11px;opacity:.7;margin-top:6px;text-align:center" id="statExtra"></div>
</div>

<!-- 日历（始终存在，有数据时显示日期高亮，无数据时显示当月空白日历） -->
<div class="calendar-panel" id="calendarPanel">
  <div class="cal-header">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="cal-title" id="calTitle"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="cal-weekdays">
    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--sub);justify-content:center">
    <span><span style="display:inline-block;width:8px;height:8px;background:var(--orange-pale);border-radius:50%;margin-right:3px;vertical-align:middle"></span>有练习</span>
    <span><span style="display:inline-block;width:8px;height:8px;background:var(--orange);border-radius:50%;margin-right:3px;vertical-align:middle"></span>选中</span>
    <span><span style="display:inline-block;width:8px;height:8px;border:1.5px solid var(--orange);border-radius:50%;margin-right:3px;vertical-align:middle"></span>今天</span>
  </div>
  <div class="empty-hint" id="calHint" style="display:none;color:var(--sub);margin-top:8px">
    写了练习的日子会在这里高亮显示，点击可查看当天写了什么 📅
  </div>
</div>

<!-- 历史记录 -->
<div class="history-header" id="historyHeader">
  <h3>📋 练习记录</h3>
  <button class="clear" onclick="clearHistory()">清空</button>
</div>
<div id="historyList"></div>

<!-- 反馈弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="score-badge" id="scoreBadge">--</div>
    <h2 id="resultTitle">批改完成</h2>
    <div class="sub" id="resultSub"></div>
    <div class="fb-block">
      <div class="lb">✨ 亮点</div>
      <ul id="fbHighlights"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">📌 改进建议</div>
      <ul id="fbImprovements"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">🎯 技巧运用</div>
      <ul id="fbSkill"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">📝 总评</div>
      <ul><li id="fbOverall"></li></ul>
    </div>
    <button class="btn-submit" style="margin-top:8px" onclick="closeModal()">我知道了</button>
    <button class="export-btn" onclick="exportRecords()">📥 导出所有记录（JSON备份）</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========== 68种技巧描述库（内置，不依赖外部数据） ========== */
const SKILL_DESCS = {
  '比喻':'用熟悉的事物描绘陌生的事物，分明喻/暗喻/借喻/博喻',
  '拟人':'赋予非人事物人的情感、动作、思想',
  '排比':'三个以上结构相似的句子排列，增强气势',
  '夸张':'故意扩大或缩小事物的特征，制造冲击力',
  '对比':'把对立事物并列，突出差异',
  '对偶':'结构相同、字数相等的两句成对排列',
  '反复':'重复使用同一词语或句子，强调情感',
  '反问':'用疑问形式表达确定意思，答案在问中',
  '设问':'自问自答，引起注意',
  '借代':'借用相关事物代替本体',
  '双关':'一词多义，表面说此实际指彼',
  '通感':'打通五官感受，用一种感官写另一种',
  '象征':'用具体形象表现抽象概念',
  '用典':'引用历史故事或前人诗句',
  '互文':'前后词语互相呼应、互相补充',
  '顶真':'上句结尾作下句开头，环环相扣',
  '回环':'前后语句循环往复',
  '拈连':'把适用于甲的词顺势用于乙',
  '移就':'把修饰甲的词移用来修饰乙',
  '层递':'层层递进，由浅入深',
  '比拟':'把人当物写或把物当人写',
  '摹状':'摹写事物的声音、颜色、形状',
  '呼告':'直接呼唤文中的人或物',
  '婉曲':'用委婉曲折的方式表达本意',
  '引用':'引用名言、诗句、典故增强说服力',
  '感官描写':'调动五感（视听嗅触味），让读者身临其境',
  '细节描写':'聚焦微小传神的细节，以小见大',
  '动作描写':'精准刻画人物动作，推动情节',
  '神态描写':'捕捉面部表情变化，揭示内心',
  '心理描写':'深入人物内心世界',
  '语言描写':'通过对话展现人物性格',
  '外貌描写':'刻画人物外在特征',
  '环境描写':'渲染氛围，烘托情感',
  '场面描写':'整体场景的铺陈与把控',
  '白描':'不加修饰，朴素勾勒',
  '工笔':'细致入微的精雕细刻',
  '侧面描写':'通过他人他物间接表现主体',
  '顺叙':'按时间顺序叙述',
  '倒叙':'先写结果再回溯原因',
  '插叙':'在主线中插入回忆或补充',
  '补叙':'事后补充说明',
  '分叙':'多条线索并行叙述',
  '第一人称':'以"我"的视角讲述',

/* ========== 全局状态 ========== */
let SKILLS = [];       // 技巧列表（从 examples.json 构建 + 内置描述补充）
let ALL_EX = [];        // 全部例句（扁平化）
let currentSkill = null;
let currentExample = null;
let history = [];
try { history = JSON.parse(localStorage.getItem('writing_history_v4') || '[]'); }
catch(e) { history = []; }

/* ========== 加载 examples.json ========== */
async function loadData() {
  try {
    const res = await fetch('examples.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    ALL_EX = data;

    // 从例句构建技巧列表（适配短字段名 t/c/s/a/w/n）
    const skillMap = new Map();
    data.forEach((ex) => {
      const key = ex.t || ex.technique || '未分类';
      const cat = ex.c || ex.category || '修辞手法';
      const sentence = ex.s || ex.sentence || '';
      const author = ex.a || ex.author || '';
      const work = ex.w || ex.work || '';
      const analysis = ex.n || ex.analysis || '';
      if (!skillMap.has(key)) {
        skillMap.set(key, {
          name: key,
          cat: cat,
          desc: SKILL_DESCS[key] || '通过练习体会这个技巧的妙处',
          examples: []
        });
      }
      skillMap.get(key).examples.push({
        text: sentence,
        src: (author ? author : '') + (work ? '《' + work + '》' : ''),
        an: analysis
      });
    });

    SKILLS = Array.from(skillMap.values());

    // 按分类排序：修辞手法 → 描写技法 → 叙事技法 → 结构布局 → 抒情技法 → 炼字造句
    const catOrder = {'修辞手法':1,'描写技法':2,'叙事技法':3,'结构布局':4,'抒情技法':5,'炼字造句':6};
    SKILLS.sort((a,b) => (catOrder[a.cat]||9) - (catOrder[b.cat]||9));

    // 随机起始
    currentSkill = SKILLS[Math.floor(Math.random() * SKILLS.length)];
    pickRandomExample();

    renderSkill();
    renderExample();
    renderHistory();
    renderStats();
    showToast('例句库已加载：' + ALL_EX.length + ' 条 ✨');
  } catch (e) {
    console.error('加载失败:', e);
    document.getElementById('exampleBody').innerHTML =
      '<div class="loading">⚠️ 例句加载失败<br><br>请确认 examples.json 存在<br>或检查网络连接</div>';
    // 即使加载失败，也渲染统计（可能本地有历史记录）
    renderStats();
  }
}

/* ========== 渲染技巧 ========== */
function renderSkill() {
  if (!currentSkill) return;
  document.getElementById('skillCat').textContent = currentSkill.cat;
  document.getElementById('skillName').textContent = currentSkill.name;
  document.getElementById('skillDesc').textContent = currentSkill.desc;
  const idx = SKILLS.indexOf(currentSkill) + 1;
  document.getElementById('skillNo').textContent = `第${idx}种 / 共${SKILLS.length}种`;
}

/* ========== 渲染例句 ========== */
function renderExample() {
  if (!currentExample) return;
  const body = document.getElementById('exampleBody');
  body.innerHTML = `
    <div class="example-text">"${currentExample.text}"</div>
    <div class="example-src">${currentExample.src ? '—— ' + currentExample.src : ''}</div>
    <div class="example-an">💡 ${currentExample.an}</div>
  `;
}

/* ========== 随机选例句 ========== */
function pickRandomExample() {
  if (!currentSkill || currentSkill.examples.length === 0) return;
  const exs = currentSkill.examples;
  let pick = exs[Math.floor(Math.random() * exs.length)];
  let attempts = 0;
  while (pick === currentExample && exs.length > 1 && attempts < 5) {
    pick = exs[Math.floor(Math.random() * exs.length)];
    attempts++;
  }
  currentExample = pick;
}

/* ========== 换技巧 ========== */
function nextSkill() {
  if (SKILLS.length <= 1) return;
  let next = SKILLS[Math.floor(Math.random() * SKILLS.length)];
  let attempts = 0;
  while (next === currentSkill && attempts < 10) {
    next = SKILLS[Math.floor(Math.random() * SKILLS.length)];
    attempts++;
  }
  currentSkill = next;
  pickRandomExample();
  renderSkill();
  renderExample();
  document.getElementById('writeArea').value = '';
  updateCharCount();
  showToast('已切换：' + currentSkill.name);
}

/* ========== 换例句 ========== */
function nextExample() {
  pickRandomExample();
  renderExample();
}

/* ========== 字数统计 ========== */
function updateCharCount() {
  const text = document.getElementById('writeArea').value;
  const len = text.replace(/\s/g, '').length;
  document.getElementById('charCount').textContent = len + ' 字';
}
document.getElementById('writeArea').addEventListener('input', updateCharCount);

/* ========== 一键复制 ========== */
function copyText() {
  const ta = document.getElementById('writeArea');
  const text = ta.value.trim();
  if (!text) { showToast('输入框是空的，没东西可复制 🤔'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制 ' + text.replace(/\s/g,'').length + ' 字到剪贴板 ✅');
    }, () => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('已复制 ✅'); }
  catch(e) { showToast('复制失败，请手动长按选择'); }
  document.body.removeChild(ta);
}

/* ========== 一键清空 ========== */
function clearText() {
  const ta = document.getElementById('writeArea');
  if (!ta.value.trim()) { showToast('已经是空的了'); return; }
  if (confirm('确定清空输入框？')) {
    ta.value = '';
    updateCharCount();
    ta.focus();
    showToast('已清空 ✨');
  }
}

/* ========== 提交练习 + AI批改 ========== */
function submitPractice() {
  const text = document.getElementById('writeArea').value.trim();
  if (text.length < 2) { showToast('至少写几个字再提交吧 ✏️'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '批改中...';
  btn.disabled = true;

  setTimeout(() => {
    const result = review(text, currentSkill);
    btn.textContent = '提交练习';
    btn.disabled = false;

    const now = new Date();
    const record = {
      id: Date.now().toString(36),
      date: now.toLocaleDateString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
      dateKey: now.toISOString().slice(0,10),
      skillName: currentSkill.name,
      skillCat: currentSkill.cat,
      example: currentExample ? currentExample.text : '',
      text: text,
      charCount: text.replace(/\s/g,'').length,
      score: result.score,
      feedback: result,
    };
    history.push(record);
    localStorage.setItem('writing_history_v4', JSON.stringify(history));

    showResult(result);
    renderHistory();
    renderStats();
  }, 600);
}

/* ========== 规则引擎批改 ========== */
function review(text, skill) {
  const wordCount = text.replace(/\s/g, '').length;
  const sentences = text.split(/[。！？\n]/).filter(s => s.trim().length > 3);

  const metaphorWords = ['像','好像','如同','仿佛','是','变成','化作','犹如','宛如','似的','一样','一般','如','似','成为','变为'];
  const foundMetaphors = metaphorWords.filter(w => text.includes(w));

  const personVerbs = ['跑','跳','走','看','说','笑','哭','坐','站','躺','拿','放','推','拉','打','踢','咬','吃','喝','唱','睡','醒','怕','爱','恨','想','知','懂','会','能','拥抱','亲吻','抚摸','凝视'];
  const foundPerson = personVerbs.filter(w => text.includes(w));

  let parallelCount = 0;
  for (let i = 0; i < sentences.length - 2; i++) {
    const l1 = sentences[i].length, l2 = sentences[i+1].length, l3 = sentences[i+2].length;
    if (Math.abs(l1-l2) < 8 && Math.abs(l2-l3) < 8 && l1 > 4) parallelCount++;
  }

  const sensoryWords = ['闻','听','看','摸','尝','触','嗅','声音','颜色','味道','温暖','冰冷','柔软','坚硬','香','臭','甜','苦','辣','酸','光亮','黑暗','嘈杂','安静','湿润','干燥'];
  const foundSensory = sensoryWords.filter(w => text.includes(w));

  const hyperboleWords = ['千万','百万','亿','天','地','宇宙','世界','全部','所有','一切','永远','从不','总是','极','最','太','千','万'];
  const foundHyperbole = hyperboleWords.filter(w => text.includes(w));

  const reduplicationPattern = /(.)\1/g;
  const reduplications = text.match(reduplicationPattern) || [];

  const contrastWords = ['但','却','然而','不过','可是','虽然','但是','相反','而'];
  const foundContrast = contrastWords.filter(w => text.includes(w));

  let score = 50;
  score += Math.min(wordCount * 0.3, 25);

  let skillUsed = false;
  let skillComment = '';
  const sname = skill.name;

  if (sname.includes('比喻')) {
    skillUsed = foundMetaphors.length > 0;
    score += foundMetaphors.length * 8;
    skillComment = skillUsed ? `使用了"${foundMetaphors.slice(0,3).join('、')}"等比喻词` : '未检测到比喻词（如"像""仿佛""是"等）';
  } else if (sname.includes('拟人')) {
    skillUsed = foundPerson.length >= 2;
    score += foundPerson.length * 3;
    skillComment = skillUsed ? `${foundPerson.length}个拟人化表达，生动` : '尝试给事物赋予人的动作和情感';
  } else if (sname.includes('排比')) {
    skillUsed = parallelCount > 0;
    score += parallelCount * 10;
    skillComment = skillUsed ? `${parallelCount}处排比结构，节奏感好` : '尝试三个结构相似的句子并列';
  } else if (sname.includes('夸张')) {
    skillUsed = foundHyperbole.length > 0;
    score += foundHyperbole.length * 5;
    skillComment = skillUsed ? `使用了"${foundHyperbole.slice(0,3).join('、')}"等夸张表达` : '尝试放大或缩小事物特征';
  } else if (sname.includes('对比') || sname.includes('对照')) {
    skillUsed = foundContrast.length > 0;
    score += foundContrast.length * 5;
    skillComment = skillUsed ? `使用了"${foundContrast.slice(0,2).join('、')}"形成对比` : '尝试把相反事物并列';
  } else if (sname.includes('感官')) {
    skillUsed = foundSensory.length >= 2;
    score += foundSensory.length * 4;
    skillComment = skillUsed ? `调动${foundSensory.length}种感官，画面感强` : '多调动感官（看/听/闻/触）';
  } else if (sname.includes('细节')) {
    skillUsed = wordCount > 40;
    score += skillUsed ? 12 : 0;
    skillComment = skillUsed ? '细节描写有展开，具体可感' : '尝试聚焦一个微小但传神的细节';
  } else {
    skillUsed = wordCount > 30;
    score += skillUsed ? 10 : 0;
    skillComment = `核心技巧"${sname}"运用${skillUsed?'较好':'待加强'}`;
  }

  if (reduplications.length > 0) score += 5;
  score = Math.min(Math.round(score), 100);

  const highlights = [];
  if (foundMetaphors.length > 0) highlights.push(`使用了比喻词"${foundMetaphors.slice(0,3).join('、')}"`);
  if (parallelCount > 0) highlights.push(`${parallelCount}处排比结构，节奏感好`);
  if (foundSensory.length >= 2) highlights.push(`调动${foundSensory.length}种感官，画面沉浸`);
  if (foundPerson.length >= 3) highlights.push(`${foundPerson.length}个拟人化表达，生动`);
  if (reduplications.length > 0) highlights.push(`${reduplications.length}组叠词，韵律感强`);
  if (wordCount > 80) highlights.push(`篇幅充实（${wordCount}字），有展开意识`);
  if (highlights.length === 0) highlights.push('完成了写作练习，这是最重要的一步 👏');

  const improvements = [];
  if (!skillUsed) improvements.push(`重点练习"${skill.name}"：${skillComment}`);
  if (wordCount < 20) improvements.push('字数偏少，多展开一些细节');
  if (foundSensory.length < 2 && !sname.includes('排比') && !sname.includes('夸张')) improvements.push('尝试加入感官描写（看到/听到/闻到什么）');
  if (improvements.length === 0) improvements.push('整体不错，下次可尝试混合多种技巧');

  let overall = '';
  if (score >= 90) overall = '非常出色！技巧运用成熟自然，可以多尝试混合多种技巧写作。';
  else if (score >= 80) overall = '写得很好，核心技巧到位。注意每次让句子比上次更深一层。';
  else if (score >= 70) overall = '不错的开头，能看出你在尝试。重点改进：' + improvements[0];
  else if (score >= 60) overall = '完成了就是胜利。建议先回顾例句，模仿其结构再写一遍。';
  else overall = '勇敢迈出第一步！多看例句，先模仿再创新。';

  return { score, level: score>=90?'优秀':score>=80?'良好':score>=70?'中等':score>=60?'及格':'加油', highlights, improvements, skillComment, overall };
}

/* ========== 日期格式化工具 ========== */
function dateKeyToStr(key) {
  const [y,m,d] = key.split('-');
  return `${parseInt(m)}月${parseInt(d)}日`;
}
function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}

/* ========== 统计面板（始终渲染，无数据时显示引导） ========== */
let calYear, calMonth, selectedDateKey;

function renderStats() {
  const hint = document.getElementById('statsHint');
  if (history.length === 0) {
    // 无数据：显示引导提示
    hint.style.display = '';
    document.getElementById('statDays').textContent = '0';
    document.getElementById('statCount').textContent = '0';
    document.getElementById('statChars').textContent = '0';
    document.getElementById('praiseText').textContent = '开始你的第一次写作吧 ✨';
    document.getElementById('statExtra').textContent = '';
    renderCalendar(); // 仍然渲染空白日历
    return;
  }
  hint.style.display = 'none';

  const days = new Set(history.map(h => h.dateKey));
  const totalChars = history.reduce((s,h) => s + (h.charCount || h.text.replace(/\s/g,'').length), 0);
  const avgScore = Math.round(history.reduce((s,h) => s + h.score, 0) / history.length);
  const avgChars = Math.round(totalChars / history.length);

  document.getElementById('statDays').textContent = days.size;
  document.getElementById('statCount').textContent = history.length;
  document.getElementById('statChars').textContent = totalChars;

  // 连续天数
  const sortedDays = [...days].sort();
  let streak = 1, maxStreak = 1;
  for (let i = sortedDays.length - 1; i > 0; i--) {
    const cur = new Date(sortedDays[i]);
    const prev = new Date(sortedDays[i-1]);
    const diff = Math.round((cur - prev) / 86400000);
    if (diff === 1) { streak++; maxStreak = Math.max(maxStreak, streak); }
    else { streak = 1; }
  }
  const todayKey = getTodayKey();
  let todayActive = days.has(todayKey);
  let currentStreak = todayActive ? streak : 0;

  // 表扬语
  const praiseEl = document.getElementById('praiseText');
  let praise = '';
  if (history.length === 1) {
    praise = '🎉 迈出第一步！第一次写作已经完成，了不起！';
  } else if (currentStreak >= 7) {
    praise = `🔥 连续 ${currentStreak} 天写作！你已经是写作机器了，太可怕了！`;
  } else if (currentStreak >= 3) {
    praise = `💪 连续 ${currentStreak} 天没有断过，习惯正在养成！`;
  } else if (totalChars >= 1000) {
    praise = `📚 累计写了 ${totalChars} 字，这是一本小册子的量了！`;
  } else if (avgScore >= 85) {
    praise = `⭐ 平均分 ${avgScore} 分，你的水平已经相当不错了！`;
  } else if (history.length >= 10) {
    praise = `🏆 写了 ${history.length} 次练习，坚持本身就是胜利！`;
  } else {
    praise = '✨ 每一次练习都在让你变得更好，继续加油！';
  }

  praiseEl.textContent = praise;
  document.getElementById('statExtra').textContent = `平均每次 ${avgChars} 字 · 平均得分 ${avgScore} 分 · 最长连续 ${maxStreak} 天`;

  renderCalendar();
}

/* ========== 日历（始终渲染） ========== */
function renderCalendar() {
  const hint = document.getElementById('calHint');
  if (history.length === 0) {
    hint.style.display = '';
  } else {
    hint.style.display = 'none';
  }

  if (!calYear || !calMonth) {
    const today = new Date();
    calYear = today.getFullYear();
    calMonth = today.getMonth();
  }
  if (!selectedDateKey) selectedDateKey = getTodayKey();

  const titleEl = document.getElementById('calTitle');
  const gridEl = document.getElementById('calGrid');
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  titleEl.textContent = `${calYear}年 ${monthNames[calMonth]}`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // 收集本月有练习的日期
  const activeSet = new Set();
  history.forEach(h => {
    if (h.dateKey && h.dateKey.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)) {
      activeSet.add(h.dateKey);
    }
  });

  const todayKey = getTodayKey();
  let html = '';

  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isActive = key === selectedDateKey;
    const hasWriting = activeSet.has(key);
    const isToday = key === todayKey;
    let cls = 'cal-day';
    if (isActive) cls += ' active-day';
    else if (hasWriting) cls += ' has-writing';
    if (isToday && !isActive) cls += ' today';
    html += `<div class="${cls}" onclick="selectDate('${key}')">`;
    html += `<span class="day-num">${d}</span>`;
    if (hasWriting) html += `<span class="day-dot" style="background:${isActive?'#fff':'var(--orange)'}"></span>`;
    html += '</div>';
  }

  const totalCells = firstDay + daysInMonth;
  const remainder = totalCells % 7;
  if (remainder > 0) {
    for (let i = 0; i < 7 - remainder; i++) html += '<div class="cal-day empty"></div>';
  }

  gridEl.innerHTML = html;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function selectDate(key) {
  selectedDateKey = key;
  renderCalendar();
  const dayRecords = history.filter(h => h.dateKey === key);
  if (dayRecords.length === 0) {
    showToast(`${dateKeyToStr(key)} 没有练习记录`);
    return;
  }
  const badge = document.getElementById('scoreBadge');
  const totalChars = dayRecords.reduce((s,h) => s + (h.charCount || 0), 0);
  const avgScore = Math.round(dayRecords.reduce((s,h) => s + h.score, 0) / dayRecords.length);
  badge.textContent = avgScore;
  const colors = avgScore>=90?['#34C759','#30D158']:avgScore>=80?['#FF8C42','#FFA940']:['#FFC53D','#FFD700'];
  badge.style.background = `linear-gradient(135deg,${colors[0]},${colors[1]})`;

  document.getElementById('resultTitle').textContent = `${dateKeyToStr(key)} 的练习`;
  document.getElementById('resultSub').textContent = `${dayRecords.length} 条练习 · 共 ${totalChars} 字`;

  const listEl = document.getElementById('fbHighlights');
  listEl.innerHTML = dayRecords.map((h,i) => `
    <li style="margin-bottom:6px">
      <b>[${h.skillName}]</b> ${h.text.slice(0,100)}${h.text.length>100?'...':''}
      <span style="color:var(--orange);font-weight:600"> (${h.score}分)</span>
    </li>
  `).join('');

  document.getElementById('fbImprovements').innerHTML = '';
  document.getElementById('fbSkill').innerHTML = '';
  document.getElementById('fbOverall').textContent = `这天你完成了 ${dayRecords.length} 次练习，累计 ${totalChars} 字，平均 ${avgScore} 分。继续加油！`;
  document.getElementById('modal').classList.add('show');
}

/* ========== 导出记录 ========== */
function exportRecords() {
  if (history.length === 0) { showToast('还没有练习记录可导出'); return; }
  const data = JSON.stringify(history, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `墨练写作记录_${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`已导出 ${history.length} 条记录 ✅`);
}

/* ========== 启动 ========== */
loadData();
</script>
