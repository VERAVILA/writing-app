<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨练 · 写作练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --orange: #FF8C42;
  --orange-light: #FFA940;
  --orange-pale: #FFF3E6;
  --bg: #F7F5F2;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --sub: #8E8E93;
  --border: #E8E4DF;
  --green: #34C759;
  --red: #FF3B30;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 14px;
  padding-bottom: 80px;
  max-width: 680px;
  margin: 0 auto;
  line-height: 1.6;
}

/* 顶部技巧卡片 */
.header {
  background: linear-gradient(135deg, #FF8C42, #FFC53D);
  border-radius: 16px;
  padding: 18px 20px;
  color: #fff;
  margin-bottom: 12px;
}
.header .label {
  font-size: 11px;
  opacity: .8;
  margin-bottom: 3px;
  letter-spacing: 1px;
}
.header h1 {
  font-size: 22px;
  margin-bottom: 4px;
}
.header .desc {
  font-size: 13px;
  opacity: .9;
  line-height: 1.5;
}
.header .cat {
  display: inline-block;
  margin-top: 6px;
  background: rgba(255,255,255,.22);
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
}

/* 例句区 */
.section {
  background: var(--card);
  border-radius: 14px;
  padding: 13px 15px;
  margin-bottom: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,.04);
}
.section .title {
  font-size: 13px;
  font-weight: 700;
  color: var(--orange);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.title-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.title .dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
}
.mini-btns { display: flex; gap: 4px; }
.mini-btn {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--orange);
  background: var(--orange-pale);
  color: var(--orange);
  white-space: nowrap;
  transition: opacity .15s;
}
.mini-btn:active { opacity: .6; }
.mini-btn.alt {
  background: transparent;
  border-color: var(--border);
  color: var(--sub);
}
.example-text {
  font-size: 16px;
  line-height: 1.7;
  color: #2C2C2E;
  font-family: "Noto Serif CJK SC", "SimSun", serif;
  margin-bottom: 5px;
}
.example-src {
  font-size: 11px;
  color: var(--sub);
  margin-bottom: 5px;
}
.example-an {
  font-size: 12px;
  color: #555;
  background: #FAFAF8;
  border-left: 3px solid var(--orange);
  padding: 7px 10px;
  border-radius: 0 6px 6px 0;
  line-height: 1.5;
}

/* 写作区 */
.write-area {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  line-height: 1.8;
  resize: vertical;
  outline: none;
  font-family: inherit;
  background: #FFFBF5;
  transition: border .2s;
}
.write-area:focus { border-color: var(--orange); }
.write-area::placeholder { color: #C0B8B0; }
.char-count {
  text-align: right;
  font-size: 12px;
  color: var(--sub);
  margin-top: 5px;
  margin-bottom: 10px;
}

/* 提交按钮 */
.btn-submit {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: linear-gradient(135deg, #FF8C42, #FFA940);
  color: #fff;
  transition: opacity .15s, transform .1s;
}
.btn-submit:active { transform: scale(.98); }
.btn-submit:disabled { opacity: .6; }

/* 反馈弹窗 */
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px 20px 30px;
  animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { text-align: center; font-size: 18px; margin-bottom: 4px; }
.modal .sub { text-align: center; font-size: 12px; color: var(--sub); margin-bottom: 14px; }
.score-badge {
  width: 80px; height: 80px;
  border-radius: 50%;
  margin: 0 auto 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
}
.fb-block { margin-bottom: 12px; }
.fb-block .lb { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 5px; }
.fb-block ul { list-style: none; padding: 0; }
.fb-block li { font-size: 13px; color: #444; line-height: 1.7; padding: 4px 0 4px 14px; position: relative; }
.fb-block li::before { content: "•"; position: absolute; left: 2px; color: var(--orange); }

/* 历史记录 */
.history-header {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin: 16px 4px 8px;
}
.history-header h3 { font-size: 14px; font-weight: 700; }
.history-header .clear { font-size: 12px; color: var(--red); background: none; border: none; cursor: pointer; }
.history-item {
  background: var(--card);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,.03);
  cursor: pointer;
}
.history-item .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.history-item .tag {
  background: var(--orange-pale);
  color: var(--orange);
  padding: 1px 7px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.history-item .date { font-size: 11px; color: var(--sub); }
.history-item .score {
  margin-left: auto;
  background: var(--orange);
  color: #fff;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.history-item .preview {
  font-size: 13px;
  color: #444;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Toast */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(.8);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 999;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

/* 加载中 */
.loading {
  text-align: center;
  padding: 20px;
  color: var(--sub);
  font-size: 13px;
}
</style>
</head>
<body>

<div class="header">
  <div class="label" id="skillCat">加载中...</div>
  <h1 id="skillName">--</h1>
  <div class="desc" id="skillDesc"></div>
  <div class="cat" id="skillNo"></div>
</div>

<div class="section" id="exampleSection">
  <div class="title">
    <div class="title-left"><span class="dot"></span> 例句参考</div>
    <div class="mini-btns">
      <button class="mini-btn" onclick="nextExample()">📖换句</button>
      <button class="mini-btn alt" onclick="nextSkill()">🔀换技巧</button>
    </div>
  </div>
  <div id="exampleBody">
    <div class="loading">例句加载中...</div>
  </div>
</div>

<div class="section">
  <div class="title"><div class="title-left"><span class="dot"></span> 你来写一个</div></div>
  <textarea class="write-area" id="writeArea" placeholder="不限字数，用这个技巧写一个句子吧……&#10;&#10;写完后点击「提交」"></textarea>
  <div class="char-count" id="charCount">0 字</div>
  <button class="btn-submit" id="submitBtn" onclick="submitPractice()">提交练习</button>
</div>

<div class="history-header" id="historyHeader">
  <h3>📋 练习记录</h3>
  <button class="clear" onclick="clearHistory()">清空</button>
</div>
<div id="historyList"></div>

<!-- 反馈弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="score-badge" id="scoreBadge">--</div>
    <h2 id="resultTitle">批改完成</h2>
    <div class="sub" id="resultSub"></div>
    <div class="fb-block">
      <div class="lb">✨ 亮点</div>
      <ul id="fbHighlights"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">📌 改进建议</div>
      <ul id="fbImprovements"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">🎯 技巧运用</div>
      <ul id="fbSkill"></ul>
    </div>
    <div class="fb-block">
      <div class="lb">📝 总评</div>
      <ul><li id="fbOverall"></li></ul>
    </div>
    <button class="btn-submit" style="margin-top:8px" onclick="closeModal()">我知道了</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========== 全局状态 ========== */
let SKILLS = [];       // 从 examples.json 构建
let ALL_EX = [];        // 全部例句（扁平化）
let currentSkill = null;
let currentExample = null;
let history = JSON.parse(localStorage.getItem('writing_history_v3') || '[]');

/* ========== 加载 examples.json ========== */
async function loadData() {
  try {
    const res = await fetch('examples.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    ALL_EX = data;

    // 从例句构建技巧列表（按 technique 字段分组）
    const skillMap = new Map();
    data.forEach((ex, idx) => {
      const key = ex.technique || '未分类';
      if (!skillMap.has(key)) {
        skillMap.set(key, {
          name: key,
          cat: ex.category || '写作技巧',
          desc: ex.explanation || '',
          examples: []
        });
      }
      skillMap.get(key).examples.push({
        text: ex.sentence,
        src: (ex.author ? ex.author : '') + (ex.work ? '《' + ex.work + '》' : ''),
        an: ex.analysis || ''
      });
    });

    SKILLS = Array.from(skillMap.values());

    // 随机起始
    currentSkill = SKILLS[Math.floor(Math.random() * SKILLS.length)];
    pickRandomExample();

    renderSkill();
    renderExample();
    renderHistory();
    showToast('例句库已加载：' + ALL_EX.length + ' 条 ✨');
  } catch (e) {
    console.error('加载失败:', e);
    document.getElementById('exampleBody').innerHTML =
      '<div class="loading">⚠️ 例句加载失败<br><br>请确认 examples.json 存在<br>或检查网络连接</div>';
  }
}

/* ========== 渲染技巧 ========== */
function renderSkill() {
  if (!currentSkill) return;
  document.getElementById('skillCat').textContent = currentSkill.cat;
  document.getElementById('skillName').textContent = currentSkill.name;
  document.getElementById('skillDesc').textContent = currentSkill.desc;
  const idx = SKILLS.indexOf(currentSkill) + 1;
  document.getElementById('skillNo').textContent = `第${idx}种 / 共${SKILLS.length}种`;
}

/* ========== 渲染例句 ========== */
function renderExample() {
  if (!currentExample) return;
  const body = document.getElementById('exampleBody');
  body.innerHTML = `
    <div class="example-text">"${currentExample.text}"</div>
    <div class="example-src">${currentExample.src ? '—— ' + currentExample.src : ''}</div>
    <div class="example-an">💡 ${currentExample.an}</div>
  `;
}

/* ========== 随机选例句 ========== */
function pickRandomExample() {
  if (!currentSkill || currentSkill.examples.length === 0) return;
  const exs = currentSkill.examples;
  let pick = exs[Math.floor(Math.random() * exs.length)];
  // 确保不重复上一条
  let attempts = 0;
  while (pick === currentExample && exs.length > 1 && attempts < 5) {
    pick = exs[Math.floor(Math.random() * exs.length)];
    attempts++;
  }
  currentExample = pick;
}

/* ========== 换技巧 ========== */
function nextSkill() {
  if (SKILLS.length <= 1) return;
  let next = SKILLS[Math.floor(Math.random() * SKILLS.length)];
  let attempts = 0;
  while (next === currentSkill && attempts < 10) {
    next = SKILLS[Math.floor(Math.random() * SKILLS.length)];
    attempts++;
  }
  currentSkill = next;
  pickRandomExample();
  renderSkill();
  renderExample();
  document.getElementById('writeArea').value = '';
  updateCharCount();
  showToast('已切换：' + currentSkill.name);
}

/* ========== 换例句 ========== */
function nextExample() {
  pickRandomExample();
  renderExample();
}

/* ========== 字数统计 ========== */
function updateCharCount() {
  const text = document.getElementById('writeArea').value;
  const len = text.replace(/\s/g, '').length;
  document.getElementById('charCount').textContent = len + ' 字';
}
document.getElementById('writeArea').addEventListener('input', updateCharCount);

/* ========== 提交练习 + AI批改 ========== */
function submitPractice() {
  const text = document.getElementById('writeArea').value.trim();
  if (text.length < 2) { showToast('至少写几个字再提交吧 ✏️'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '批改中...';
  btn.disabled = true;

  setTimeout(() => {
    const result = review(text, currentSkill);
    btn.textContent = '提交练习';
    btn.disabled = false;

    const record = {
      id: Date.now().toString(36),
      date: new Date().toLocaleDateString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
      skillName: currentSkill.name,
      skillCat: currentSkill.cat,
      example: currentExample ? currentExample.text : '',
      text: text,
      score: result.score,
      feedback: result,
    };
    history.push(record);
    localStorage.setItem('writing_history_v3', JSON.stringify(history));

    showResult(result);
    renderHistory();
  }, 600);
}

/* ========== 规则引擎批改 ========== */
function review(text, skill) {
  const wordCount = text.replace(/\s/g, '').length;
  const sentences = text.split(/[。！？\n]/).filter(s => s.trim().length > 3);

  // 检测特征
  const metaphorWords = ['像','好像','如同','仿佛','是','变成','化作','犹如','宛如','似的','一样','一般','如','似','成为','变为'];
  const foundMetaphors = metaphorWords.filter(w => text.includes(w));

  const personVerbs = ['跑','跳','走','看','说','笑','哭','坐','站','躺','拿','放','推','拉','打','踢','咬','吃','喝','唱','睡','醒','怕','爱','恨','想','知','懂','会','能','拥抱','亲吻','抚摸','凝视'];
  const foundPerson = personVerbs.filter(w => text.includes(w));

  let parallelCount = 0;
  for (let i = 0; i < sentences.length - 2; i++) {
    const l1 = sentences[i].length, l2 = sentences[i+1].length, l3 = sentences[i+2].length;
    if (Math.abs(l1-l2) < 8 && Math.abs(l2-l3) < 8 && l1 > 4) parallelCount++;
  }

  const sensoryWords = ['闻','听','看','摸','尝','触','嗅','声音','颜色','味道','温暖','冰冷','柔软','坚硬','香','臭','甜','苦','辣','酸','光亮','黑暗','嘈杂','安静','湿润','干燥'];
  const foundSensory = sensoryWords.filter(w => text.includes(w));

  const hyperboleWords = ['千万','百万','亿','天','地','宇宙','世界','全部','所有','一切','永远','从不','总是','极','最','太','千','万'];
  const foundHyperbole = hyperboleWords.filter(w => text.includes(w));

  const reduplicationPattern = /(.)\1/g;
  const reduplications = text.match(reduplicationPattern) || [];

  const contrastWords = ['但','却','然而','不过','可是','虽然','但是','相反','而'];
  const foundContrast = contrastWords.filter(w => text.includes(w));

  // 评分
  let score = 50;
  score += Math.min(wordCount * 0.3, 25);

  let skillUsed = false;
  let skillComment = '';
  const sname = skill.name;

  if (sname.includes('比喻')) {
    skillUsed = foundMetaphors.length > 0;
    score += foundMetaphors.length * 8;
    skillComment = skillUsed ? `使用了"${foundMetaphors.slice(0,3).join('、')}"等比喻词` : '未检测到比喻词（如"像""仿佛""是"等）';
  } else if (sname.includes('拟人')) {
    skillUsed = foundPerson.length >= 2;
    score += foundPerson.length * 3;
    skillComment = skillUsed ? `${foundPerson.length}个拟人化表达，生动` : '尝试给事物赋予人的动作和情感';
  } else if (sname.includes('排比')) {
    skillUsed = parallelCount > 0;
    score += parallelCount * 10;
    skillComment = skillUsed ? `${parallelCount}处排比结构，节奏感好` : '尝试三个结构相似的句子并列';
  } else if (sname.includes('夸张')) {
    skillUsed = foundHyperbole.length > 0;
    score += foundHyperbole.length * 5;
    skillComment = skillUsed ? `使用了"${foundHyperbole.slice(0,3).join('、')}"等夸张表达` : '尝试放大或缩小事物特征';
  } else if (sname.includes('对比') || sname.includes('对照')) {
    skillUsed = foundContrast.length > 0;
    score += foundContrast.length * 5;
    skillComment = skillUsed ? `使用了"${foundContrast.slice(0,2).join('、')}"形成对比` : '尝试把相反事物并列';
  } else if (sname.includes('感官')) {
    skillUsed = foundSensory.length >= 2;
    score += foundSensory.length * 4;
    skillComment = skillUsed ? `调动${foundSensory.length}种感官，画面感强` : '多调动感官（看/听/闻/触）';
  } else if (sname.includes('细节')) {
    skillUsed = wordCount > 40;
    score += skillUsed ? 12 : 0;
    skillComment = skillUsed ? '细节描写有展开，具体可感' : '尝试聚焦一个微小但传神的细节';
  } else {
    skillUsed = wordCount > 30;
    score += skillUsed ? 10 : 0;
    skillComment = `核心技巧"${sname}"运用${skillUsed?'较好':'待加强'}`;
  }

  if (reduplications.length > 0) score += 5;
  score = Math.min(Math.round(score), 100);

  // 亮点
  const highlights = [];
  if (foundMetaphors.length > 0) highlights.push(`使用了比喻词"${foundMetaphors.slice(0,3).join('、')}"`);
  if (parallelCount > 0) highlights.push(`${parallelCount}处排比结构，节奏感好`);
  if (foundSensory.length >= 2) highlights.push(`调动${foundSensory.length}种感官，画面沉浸`);
  if (foundPerson.length >= 3) highlights.push(`${foundPerson.length}个拟人化表达，生动`);
  if (reduplications.length > 0) highlights.push(`${reduplications.length}组叠词，韵律感强`);
  if (wordCount > 80) highlights.push(`篇幅充实（${wordCount}字），有展开意识`);
  if (highlights.length === 0) highlights.push('完成了写作练习，这是最重要的一步 👏');

  // 改进
  const improvements = [];
  if (!skillUsed) improvements.push(`重点练习"${skill.name}"：${skillComment}`);
  if (wordCount < 20) improvements.push('字数偏少，多展开一些细节');
  if (foundSensory.length < 2 && !sname.includes('排比') && !sname.includes('夸张')) improvements.push('尝试加入感官描写（看到/听到/闻到什么）');
  if (improvements.length === 0) improvements.push('整体不错，下次可尝试混合多种技巧');

  // 总评
  let overall = '';
  if (score >= 90) overall = '非常出色！技巧运用成熟自然，可以多尝试混合多种技巧写作。';
  else if (score >= 80) overall = '写得很好，核心技巧到位。注意每次让句子比上次更深一层。';
  else if (score >= 70) overall = '不错的开头，能看出你在尝试。重点改进：' + improvements[0];
  else if (score >= 60) overall = '完成了就是胜利。建议先回顾例句，模仿其结构再写一遍。';
  else overall = '勇敢迈出第一步！多看例句，先模仿再创新。';

  return { score, level: score>=90?'优秀':score>=80?'良好':score>=70?'中等':score>=60?'及格':'加油', highlights, improvements, skillComment, overall };
}

/* ========== 显示结果 ========== */
function showResult(r) {
  const badge = document.getElementById('scoreBadge');
  badge.textContent = r.score;
  const colors = r.score>=90?['#34C759','#30D158']:r.score>=80?['#FF8C42','#FFA940']:r.score>=70?['#FFC53D','#FFD700']:['#FF3B30','#FF6B6B'];
  badge.style.background = `linear-gradient(135deg,${colors[0]},${colors[1]})`;
  document.getElementById('resultTitle').textContent = '批改完成';
  document.getElementById('resultSub').textContent = `得分 ${r.score} / 100 · ${r.level}`;
  document.getElementById('fbHighlights').innerHTML = r.highlights.map(h => `<li>${h}</li>`).join('');
  document.getElementById('fbImprovements').innerHTML = r.improvements.map(h => `<li>${h}</li>`).join('');
  document.getElementById('fbSkill').innerHTML = `<li>${r.skillComment}</li>`;
  document.getElementById('fbOverall').textContent = r.overall;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

/* ========== 历史记录 ========== */
function renderHistory() {
  const header = document.getElementById('historyHeader');
  const list = document.getElementById('historyList');
  if (history.length === 0) { header.style.display = 'none'; list.innerHTML = ''; return; }
  header.style.display = 'flex';
  const recent = [...history].reverse().slice(0, 20);
  list.innerHTML = recent.map(h => `
    <div class="history-item" onclick="showHistoryDetail('${h.id}')">
      <div class="row1">
        <span class="tag">${h.skillName}</span>
        <span class="date">${h.date}</span>
        <span class="score">${h.score}分</span>
      </div>
      <div class="preview">${h.text.slice(0, 120)}</div>
    </div>
  `).join('');
}
function showHistoryDetail(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  const r = h.feedback || {};
  const badge = document.getElementById('scoreBadge');
  badge.textContent = h.score;
  const colors = h.score>=90?['#34C759','#30D158']:h.score>=80?['#FF8C42','#FFA940']:['#FFC53D','#FFD700'];
  badge.style.background = `linear-gradient(135deg,${colors[0]},${colors[1]})`;
  document.getElementById('resultTitle').textContent = h.skillName + ' · ' + h.date;
  document.getElementById('resultSub').textContent = '例句参考：' + (h.example || '');
  document.getElementById('fbHighlights').innerHTML = (r.highlights||['—']).map(x => `<li>${x}</li>`).join('');
  document.getElementById('fbImprovements').innerHTML = (r.improvements||['—']).map(x => `<li>${x}</li>`).join('');
  document.getElementById('fbSkill').innerHTML = `<li>${(r.skillComment)||'—'}</li>`;
  document.getElementById('fbOverall').textContent = (r.overall||'') + '\n\n【你的原文】\n' + h.text;
  document.getElementById('modal').classList.add('show');
}
function clearHistory() {
  if (confirm('确定清空所有练习记录？')) {
    history = [];
    localStorage.removeItem('writing_history_v3');
    renderHistory();
    showToast('已清空');
  }
}

/* ========== Toast ========== */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ========== 启动 ========== */
loadData();
</script>
</body>
</html>
